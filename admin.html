<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Admin Panel</title>
    <script>
        const HASLO = "Koliber2305";
        function sprawdzHaslo() {
            const haslo = prompt("Podaj hasło administratora:");
            if (haslo !== HASLO) {
                alert("Błędne hasło!");
                window.location.href = "index.html";
            }
        }
        sprawdzHaslo();
    </script>
</head>
<body>
    <div class="container" style="padding-top: 50px;">
        <h1>Dodaj nowy projekt</h1>
        <div class="card" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="pTitle" placeholder="Tytuł projektu" style="padding: 10px;">
            <input type="text" id="pImg" placeholder="Link do zdjęcia (URL)" style="padding: 10px;">
            <textarea id="pDesc" rows="5" placeholder="Opis projektu..." style="padding: 10px;"></textarea>
            <button onclick="saveProject()" style="padding: 15px; cursor: pointer;">Zapisz projekt</button>
        </div>
        <br>
        <a href="index.html" style="color: #38bdf8;">← Powrót do portfolio</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
