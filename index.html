<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Dev Studio | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Web Dev Studio</h1>
            <p>Buduję cyfrową przyszłość Twojego biznesu.</p>
        </header>

        <main id="projectList" class="grid"></main>

        <footer class="contact-section">
            <div class="contact-content">
                <h3>Gotowy na współpracę?</h3>
                <p>Porozmawiajmy o Twoim projekcie:</p>
                <div class="phone-wrapper">
                    <span class="icon">📞</span>
                    <span class="phone">792 748 410</span>
                </div>
                <div class="hours">
                    <span>🕒 Dostępność: Pn-Pt: 15:00 - 20:00</span>
                </div>
            </div>
        </footer>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="Projekt">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
