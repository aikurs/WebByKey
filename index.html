<!DOCTYPE html>
<html lang="pl">
<head>

    <title>Web Dev Studio | Profesjonalne Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <header class="header">

        </header>

        <main id="projectList" class="grid"></main>

        <footer class="contact-card">

            <div class="phone">792 748 410</div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>

            <p id="modalDesc"></p>
